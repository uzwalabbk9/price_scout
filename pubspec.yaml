name: price_scout
description: PriceScout - Real-time price comparison app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP
  dio: ^5.4.3

  # Images
  cached_network_image: ^3.4.1

  # Storage
  shared_preferences: ^2.5.5

  # Charts
  fl_chart: ^0.67.0

  # UI
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

  # Formatting
  intl: ^0.19.0

  # Links
  url_launcher: ^6.3.0

  # Notifications
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
